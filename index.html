<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <title>Weather Zen</title>
</head>
<body>
  <div class="container">
    <div class="wrapper">
        <div class="img_section">
            <div class="default_info">
                <h2 class="default_day">Sunday</h2>
                <span class="default_date">26 December 2024</span>
                <div class="icons">
                   <img src="https://openweathermap.org/img/wn/10d@4x.png" alt="" />
                   <h2 class="weather_temp">22℃</h2>
                   <h3 class="cloudtxt">Overcast Cloud</h3>
                </div>
            </div>
        </div>
        <div class="content_section">
            <form>
                <input 
                type="text" 
                 placeholder="Search location" 
                 class="input_field"
                 />
                <button type="submit" class="btn_search">search</button>
            </form>

            <div class="day_info">
             <div class="content">
                <p class="title">NAME</p>
                <span class="value">Pakistan</span>
             </div>   
             <div class="content">
                <p class="title">TEMP</p>
                <span class="value">23℃</span>
             </div>  
             <div class="content">
                <p class="title">HUMIDITY</p>
                <span class="value">2%</span>
             </div>  
             <div class="content">
                <p class="title">WIND SPEED</p>
                <span class="value">4 km/h</span>
             </div>  
            </div>
            <div class="list_content">
                <ul>
                    <!-- Forecast data will be dynamically inserted here -->
                </ul>
            </div>
        </div>
    </div>
  </div>  
  <script src="script.js"></script>
</body>
</html>
